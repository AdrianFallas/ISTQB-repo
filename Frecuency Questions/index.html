<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quiz App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header (sin cambios) -->
        <div id="btn-home" title="Go to home">
            <img src="../Utility/Imagenes/home.png" alt="Home" class="home-icon">
            <span id="home">Go to home</span>
        </div>
        <button class="btn-dark-mode" onclick="darkMode()">
            <img class="dark-mode-icon" src="../Utility/Imagenes/dark-mode.png" alt="Toggle dark mode">
        </button>
        <select id="language">
            <option value="es">Esp</option>
            <option value="en">Eng</option>
        </select>
        
        <h1 id="questions-name"></h1>

        <form id="quiz-form">
            <!-- ✅ SOLO UN questions-container -->
            <div id="questions-container"></div>
            
            <div class="navigation">
                <button type="button" id="next-btn">Next</button>
            </div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
